{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGA - Sistema de Gestão de Aprendizagem</title>

    <!-- Poppins (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tema ElevaMind -->
    <link rel="stylesheet" href="{% static 'core/css/elevamind-theme.css' %}">

    <!-- Aplica tema salvo antes do render -->
    <script>
      (function() {
        const saved = localStorage.getItem('sga-theme');
        if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body>

    <nav class="navbar mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="{% url 'home' %}">
          🎓 Elevamind SGA
        </a>

        <div class="d-flex align-items-center gap-2">
          {% if user.is_authenticated %}
            <span class="navbar-user d-none d-md-inline">
              👋 Olá, <strong>{{ user.username }}</strong>
            </span>

            <form action="{% url 'logout' %}" method="post" class="d-inline m-0">
              {% csrf_token %}
              <button type="submit" class="btn-navbar-action" title="Sair">
                <span class="d-none d-md-inline">Sair</span>
                <span class="d-md-none">🚪</span>
              </button>
            </form>
          {% endif %}

          <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema claro/escuro" title="Alternar tema">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="card">
        <div class="card-body">
          {% block conteudo %}{% endblock %}
        </div>
      </div>

      <footer class="mt-4 text-center text-muted small">
        <p>&copy; 2026 Elevamind - Versão Alpha</p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      (function() {
        const btn  = document.getElementById('theme-toggle');
        const root = document.documentElement;
        if (!btn) return;
        btn.addEventListener('click', function() {
          const current = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
          const next    = current === 'dark' ? 'light' : 'dark';
          if (next === 'dark') root.setAttribute('data-theme', 'dark');
          else root.removeAttribute('data-theme');
          localStorage.setItem('sga-theme', next);
        });
      })();
    </script>

    <style>
      .navbar-user {
        color: #FFFFFF;
        font-size: 0.9rem;
      }
      .btn-navbar-action {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #FFFFFF;
        padding: 0.45rem 0.9rem;
        border-radius: var(--em-radius-md);
        font-size: 0.9rem;
        font-family: var(--em-font-family);
        cursor: pointer;
        transition: all 0.2s ease-in-out;
      }
      .btn-navbar-action:hover {
        background: rgba(255, 255, 255, 0.12);
      }
    </style>

  </body>
</html>
